{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm border-0 mx-auto" style="max-width: 600px;">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h4 class="mb-0">使用者詳細資訊</h4>
        <span class="badge bg-primary px-3 py-2 rounded-pill">{{ user.role }}</span>
    </div>
    <div class="card-body p-4">
        <div class="row mb-2 border-bottom pb-2">
            <div class="col-4 text-muted">ID</div><div class="col-8">{{ user.id }}</div>
        </div>
        <div class="row mb-2 border-bottom pb-2">
            <div class="col-4 text-muted">姓名</div><div class="col-8">{{ user.name }}</div>
        </div>
        <div class="row mb-2 border-bottom pb-2">
            <div class="col-4 text-muted">信箱</div><div class="col-8">{{ user.email }}</div>
        </div>
        <div class="row mb-2 border-bottom pb-2">
            <div class="col-4 text-muted">電話</div><div class="col-8">{{ user.phone }}</div>
        </div>
        <div class="row mb-2 border-bottom pb-2">
            <div class="col-4 text-muted">積分</div><div class="col-8 text-success fw-bold">{{ user.points }}</div>
        </div>
        <div class="row mb-2 pb-2">
            <div class="col-4 text-muted">建立時間</div><div class="col-8">{{ user.created_at }}</div>
        </div>
        <div class="d-flex justify-content-between mt-4">
            <a href="{{ url_for('user_bp.index') }}" class="btn btn-outline-secondary">返回列表</a>
            <a href="{{ url_for('user_bp.edit', user_id=user.id) }}" class="btn btn-warning text-white">編輯資料</a>
        </div>
    </div>
</div>
{% endblock %}
