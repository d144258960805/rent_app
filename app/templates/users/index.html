{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>使用者列表</h2>
    <a href="{{ url_for('user_bp.create') }}" class="btn btn-primary">新增使用者</a>
</div>
<div class="card shadow-sm border-0">
    <div class="card-body">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>ID</th><th>姓名</th><th>角色</th><th>信箱</th><th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.id }}</td>
                    <td>{{ user.name }}</td>
                    <td><span class="badge bg-secondary">{{ user.role }}</span></td>
                    <td>{{ user.email }}</td>
                    <td>
                        <a href="{{ url_for('user_bp.view', user_id=user.id) }}" class="btn btn-sm btn-info text-white">查看</a>
                        <a href="{{ url_for('user_bp.edit', user_id=user.id) }}" class="btn btn-sm btn-warning text-white">編輯</a>
                        <form action="{{ url_for('user_bp.delete', user_id=user.id) }}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('確定要刪除嗎？')">刪除</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="5" class="text-center text-muted">目前沒有使用者。</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
