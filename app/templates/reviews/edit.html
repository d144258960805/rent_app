{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm border-0 mx-auto" style="max-width: 600px;">
    <div class="card-header bg-white py-3"><h4 class="mb-0">編輯評論</h4></div>
    <div class="card-body p-4">
        <form action="{{ url_for('review_bp.edit', review_id=review.id) }}" method="POST">
            <div class="mb-4">
                <label class="form-label text-muted">評論內容 *</label>
                <textarea name="content" class="form-control bg-light" rows="5" required>{{ review.content }}</textarea>
            </div>
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('review_bp.view', review_id=review.id) }}" class="btn btn-outline-secondary">取消</a>
                <button type="submit" class="btn btn-warning text-white px-4">儲存變更</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
