{% extends 'layout.html' %}

{% block title %}登入帳號 - 逢甲租屋網{% endblock %}

{% block content %}
<div class="form-card">
    <h2 class="form-title">🔑 登入帳號</h2>
    
    <form method="post" action="{{ url_for('auth.login') }}">
        <div class="form-group">
            <label for="email">電子信箱 Email</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="name@domain.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">安全密碼 Password</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-primary" style="margin-top: 1rem;">登入帳號</button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
        還沒有帳號嗎？ <a href="{{ url_for('auth.register') }}" style="font-weight: 600;">免費註冊帳號 →</a>
    </div>
</div>
{% endblock %}
