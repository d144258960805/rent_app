{% extends 'layout.html' %}

{% block title %}註冊新帳號 - 逢甲租屋網{% endblock %}

{% block content %}
<div class="form-card">
    <h2 class="form-title">📝 註冊新帳號</h2>
    
    <form method="post" action="{{ url_for('auth.register') }}">
        <div class="form-group">
            <label for="email">電子信箱 Email *</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="name@domain.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">安全密碼 Password *</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="至少 6 位字元密碼" required>
        </div>
        
        <div class="form-group">
            <label for="name">真實姓名 Name *</label>
            <input type="text" id="name" name="name" class="form-input" placeholder="例如：李小明" required>
        </div>
        
        <div class="form-group">
            <label for="role">註冊身分 Role *</label>
            <select id="role" name="role" class="filter-select" required>
                <option value="student">🎓 學生身分 (尋求房源、找室友、匿名評論)</option>
                <option value="landlord">🏠 房東身分 (刊登房源、實名身分與權狀認證)</option>
                <option value="admin">⚙️ 系統管理者 (後台資料與實名身分審核)</option>
            </select>
        </div>
        
        <button type="submit" class="btn-primary" style="margin-top: 1rem;">免費註冊帳號</button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
        已經有帳號了嗎？ <a href="{{ url_for('auth.login') }}" style="font-weight: 600;">立即登入帳號 →</a>
    </div>
</div>
{% endblock %}
