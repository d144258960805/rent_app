{% extends 'layout.html' %}

{% block content %}
<h2>上傳證明文件</h2>
<div class="flash" style="background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba;">
    為了防止虛假房源與詐騙，系統管理員必須核對您的身分證與權狀影本。審核通過後即可刊登房源。
</div>

<form method="post" action="{{ url_for('auth.upload_docs') }}" enctype="multipart/form-data">
    <div style="margin-bottom: 1rem; margin-top: 1rem;">
        <label for="id_card">上傳身分證 (正面)：</label><br>
        <input type="file" id="id_card" name="id_card" accept="image/*" required>
    </div>
    <div style="margin-bottom: 1rem;">
        <label for="title_deed">上傳房屋權狀：</label><br>
        <input type="file" id="title_deed" name="title_deed" accept="image/*" required>
    </div>
    <button type="submit">上傳送出審核</button>
</form>
{% endblock %}
