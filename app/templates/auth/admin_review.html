{% extends 'layout.html' %}

{% block content %}
<h2>後台審核：房東身分驗證</h2>

{% if verifications %}
    <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
        <thead>
            <tr style="background-color: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                <th style="padding: 12px; text-align: left;">申請時間</th>
                <th style="padding: 12px; text-align: left;">房東姓名 (Email)</th>
                <th style="padding: 12px; text-align: left;">證明文件</th>
                <th style="padding: 12px; text-align: left;">操作</th>
            </tr>
        </thead>
        <tbody>
            {% for v in verifications %}
            <tr style="border-bottom: 1px solid #dee2e6;">
                <td style="padding: 12px;">{{ v.submitted_at }}</td>
                <td style="padding: 12px;">{{ v.name }}<br><small>{{ v.email }}</small></td>
                <td style="padding: 12px;">
                    <a href="{{ url_for('static', filename=v.id_card_path) }}" target="_blank" style="display:block; margin-bottom: 5px;">查看身分證</a>
                    <a href="{{ url_for('static', filename=v.title_deed_path) }}" target="_blank" style="display:block;">查看權狀</a>
                </td>
                <td style="padding: 12px;">
                    <form method="post" action="{{ url_for('auth.admin_review') }}" style="display: inline-block;">
                        <input type="hidden" name="verification_id" value="{{ v.id }}">
                        <button type="submit" name="action" value="approve" style="background-color: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">核准</button>
                    </form>
                    <form method="post" action="{{ url_for('auth.admin_review') }}" style="display: inline-block;">
                        <input type="hidden" name="verification_id" value="{{ v.id }}">
                        <button type="submit" name="action" value="reject" style="background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">拒絕</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p>目前沒有待審核的案件。</p>
{% endif %}
{% endblock %}
