{% extends "base.html" %}
{% block content %}
<div class="p-5 text-center bg-light rounded-3 mb-4 border">
    <h1 class="mb-3">找室友佈告欄</h1>
    <p class="lead text-muted">想找人合租整層住家？或是想找個好相處的室友？在這裡發佈你的需求吧！</p>
    <a href="{{ url_for('roommate_bp.create') }}" class="btn btn-primary btn-lg mt-2 px-4 rounded-pill shadow-sm">立即發佈徵求</a>
</div>

<div class="row row-cols-1 row-cols-md-2 g-4">
    {% for post in posts %}
    <div class="col">
        <div class="card shadow-sm border-0 h-100">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h5 class="card-title text-primary mb-0">{{ post.title }}</h5>
                    <span class="badge rounded-pill {% if post.required_gender == '限女' %}bg-danger{% elif post.required_gender == '限男' %}bg-primary{% else %}bg-secondary{% endif %}">
                        {{ post.required_gender }}
                    </span>
                </div>
                <p class="card-text text-muted mb-4 text-truncate">{{ post.content }}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <small class="text-muted">發佈者: 學生 #{{ post.student_id }}</small>
                    <a href="{{ url_for('roommate_bp.view', post_id=post.id) }}" class="btn btn-sm btn-outline-primary rounded-pill px-3">查看</a>
                </div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-4">
        <p class="text-muted fs-5">目前佈告欄空空如也，快來發佈第一篇貼文吧！</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
