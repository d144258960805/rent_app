{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm border-0 mx-auto" style="max-width: 700px;">
    <div class="card-body p-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0 text-primary">{{ post.title }}</h2>
            <span class="badge px-3 py-2 fs-6 rounded-pill {% if post.required_gender == '限女' %}bg-danger{% elif post.required_gender == '限男' %}bg-primary{% else %}bg-secondary{% endif %}">
                限制: {{ post.required_gender }}
            </span>
        </div>
        
        <div class="d-flex align-items-center text-muted mb-4 pb-3 border-bottom">
            <i class="bi bi-person-circle fs-4 me-2"></i>
            <span>學生 #{{ post.student_id }} 發佈於 {{ post.created_at }}</span>
        </div>

        <div class="bg-light p-4 rounded-3 mb-5">
            <p class="fs-5 lh-lg mb-0" style="white-space: pre-line;">{{ post.content }}</p>
        </div>
        
        <div class="d-flex justify-content-between">
            <a href="{{ url_for('roommate_bp.index') }}" class="btn btn-outline-secondary px-4">返回佈告欄</a>
            <div>
                <a href="{{ url_for('roommate_bp.edit', post_id=post.id) }}" class="btn btn-outline-warning me-2 px-4">編輯</a>
                <form action="{{ url_for('roommate_bp.delete', post_id=post.id) }}" method="POST" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger px-4" onclick="return confirm('確定刪除此貼文？')">刪除</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
