{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm border-0 mx-auto" style="max-width: 700px;">
    <div class="card-header bg-white py-3"><h4 class="mb-0">編輯房源</h4></div>
    <div class="card-body p-4">
        <form action="{{ url_for('property_bp.edit', property_id=property.id) }}" method="POST">
            <div class="mb-3">
                <label class="form-label text-muted">標題 *</label>
                <input type="text" name="title" class="form-control bg-light" value="{{ property.title }}" required>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label text-muted">租金 (月) *</label>
                    <input type="number" name="price" class="form-control bg-light" value="{{ property.price }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted">房型</label>
                    <input type="text" name="room_type" class="form-control bg-light" value="{{ property.room_type }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted">地址</label>
                <input type="text" name="address" class="form-control bg-light" value="{{ property.address }}">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted">房屋描述</label>
                <textarea name="description" class="form-control bg-light" rows="4">{{ property.description }}</textarea>
            </div>
            <div class="mb-4 form-check form-switch">
                <input type="checkbox" class="form-check-input" name="has_subsidy" id="hasSubsidy" role="switch" {% if property.has_subsidy %}checked{% endif %}>
                <label class="form-check-label text-muted" for="hasSubsidy">此房源可申請租金補貼</label>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <a href="{{ url_for('property_bp.view', property_id=property.id) }}" class="btn btn-outline-secondary px-4">取消</a>
                <button type="submit" class="btn btn-warning px-4 text-white">儲存變更</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
